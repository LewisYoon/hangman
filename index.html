<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hangman Game</title>
    <link rel="stylesheet" href="style.css" />
    <script defer type="module" src="./js/app.js"></script>
  </head>

  <body>
    <div class="hangman">
      <h1 class="hangman__title">Hangman</h1>

      <div class="hangman__scoreboard">
        <span
          >Wins:<span id="wins-count" class="scoreboard__count">0</span></span
        >
        <span
          >Losses:<span id="losses-count" class="scoreboard__count"
            >0</span
          ></span
        >
      </div>

      <div class="hangman__img-container">
        <img
          id="image"
          class="hangman__image"
          src="./assets/img/h-0.jpg"
          alt="Hangman"
        />
      </div>

      <p id="word-display" class="hangman__word-display"></p>

      <h2 id="message" class="hangman__message"></h2>

      <div id="keyboard" class="hangman__keyboard"></div>

      <br />

      <button id="reset-btn" class="hangman__reset-btn">Play Again</button>

      <h3 class="hangman__history">Used Words:</h3>
      <ul id="used-words-list" class="hangman__history-list"></ul>
    </div>
  </body>
</html>
